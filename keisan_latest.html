<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>レンタル料金計算 v1.2.2 by Popolo App.com</title>
    <style>
        :root {
            --ios-bg: #f2f2f7;
            --ios-card: #ffffff;
            --ios-blue: #007aff;
            --ios-gray: #8e8e93;
            --ios-border: #c6c6c8;
            --font-main: 22px;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--ios-bg);
            margin: 0;
            padding: 10px;
            color: #000;
        }
        .container { max-width: 500px; margin: 0 auto; }
        
        .total-display-card {
            background: var(--ios-blue);
            color: white;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
            box-shadow: 0 8px 20px rgba(0,122,255,0.3);
            position: sticky;
            top: 10px;
            z-index: 100;
        }
        .app-name-label { font-size: 16px; font-weight: bold; opacity: 0.9; margin-bottom: 5px; display: block; }
        .total-label { font-size: 18px; opacity: 0.8; }
        .total-amount { font-size: 48px; font-weight: bold; margin: 5px 0; }
        .ver-label { font-size: 12px; text-align: right; display: block; opacity: 0.7; margin-top: 5px; }

        .section-header { font-size: 18px; color: var(--ios-gray); margin: 0 0 8px 15px; font-weight: bold; }
        .section { background: var(--ios-card); border-radius: 12px; margin-bottom: 25px; overflow: hidden; border: 1px solid var(--ios-border); }
        
        .row { display: flex; align-items: center; justify-content: space-between; padding: 18px 20px; border-bottom: 0.5px solid var(--ios-border); }
        .row:last-child { border-bottom: none; }
        
        .label { font-size: var(--font-main); font-weight: 600; flex-shrink: 0; margin-right: 10px; }
        
        select, input[type="number"] { 
            font-size: var(--font-main); 
            border: 2px solid #e5e5ea; 
            border-radius: 8px;
            background: #fafafa; 
            text-align: center;
            text-align-last: center;
            color: var(--ios-blue); 
            outline: none; 
            padding: 8px;
            min-width: 180px;
            max-width: 240px;
        }
        
        .stepper { display: flex; align-items: center; gap: 20px; background: #efeff4; border-radius: 10px; padding: 6px 12px; }
        .btn { width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; font-size: 30px; font-weight: bold; color: var(--ios-blue); cursor: pointer; user-select: none; }
        .count-value { min-width: 35px; text-align: center; font-size: 26px; font-weight: bold; font-variant-numeric: tabular-nums; }
        
        .footer { text-align: center; font-size: 16px; color: var(--ios-gray); margin: 40px 0; }
        .price-info { font-size: 14px; color: var(--ios-gray); display: block; font-weight: normal; }
    </style>
</head>
<body>

<div class="container">
    <div class="total-display-card">
        <span class="app-name-label">レンタル料金計算 by Popolo App.com</span>
        <div class="total-label">合計金額 (税込)</div>
        <div class="total-amount">¥<span id="totalDisplay">0</span></div>
        <span class="ver-label">Version 1.2.2</span>
    </div>

    <div class="section-header">基本設定</div>
    <div class="section">
        <div class="row">
            <div class="label">プラン</div>
            <select id="basePrice" onchange="onPlanChange()">
                <option value="5500">ウインドサーフィン ¥5,500</option>
                <option value="7700">ウイングフォイル ¥7,700</option>
                <option value="8800">ウインドフォイル ¥8,800</option>
                <option value="4400">SUP ¥4,400</option>
                <option value="6000" data-tokutai="true">特待生基本 ¥6,000</option>
                <option value="7500" data-tokutai="true">特待生コミコミ ¥7,500</option>
            </select>
        </div>
        <div class="row">
            <div class="label">人数</div>
            <div class="stepper">
                <div class="btn" onclick="step('personCount', -1)">−</div>
                <span class="count-value" id="personCountText">1</span>
                <div class="btn" onclick="step('personCount', 1)">＋</div>
            </div>
        </div>
    </div>

    <div class="section-header">時間延長設定</div>
    <div class="section">
        <div class="row">
            <div class="label">延長単価</div>
            <select id="exUnitPrice" onchange="calculate()">
                <option value="1100" selected>¥1,100</option>
                <option value="550">¥550</option>
            </select>
        </div>
        <div class="row">
            <div class="label">延長時間(h)</div>
            <div class="stepper">
                <div class="btn" onclick="step('exTime', -1)">−</div>
                <span class="count-value" id="exTimeText">0</span>
                <div class="btn" onclick="step('exTime', 1)">＋</div>
            </div>
        </div>
        <div class="row">
            <div class="label">延長人数</div>
            <div class="stepper">
                <div class="btn" onclick="step('exQty', -1)">−</div>
                <span class="count-value" id="exQtyText">0</span>
                <div class="btn" onclick="step('exQty', 1)">＋</div>
            </div>
        </div>
    </div>

    <div class="section-header">オプション</div>
    <div class="section">
        <div class="row"><div class="label">機材保険<span class="price-info">¥550</span></div>
            <div class="stepper"><div class="btn" onclick="step('ins', -1)">−</div><span class="count-value" id="insText">1</span><div class="btn" onclick="step('ins', 1)">＋</div></div>
        </div>
        <div class="row"><div class="label">ウェット<span class="price-info">¥1,100</span></div>
            <div class="stepper"><div class="btn" onclick="step('wet', -1)">−</div><span class="count-value" id="wetText">0</span><div class="btn" onclick="step('wet', 1)">＋</div></div>
        </div>
        <div class="row"><div class="label">ブーツ<span class="price-info">¥330</span></div>
            <div class="stepper"><div class="btn" onclick="step('boots', -1)">−</div><span class="count-value" id="bootsText">0</span><div class="btn" onclick="step('boots', 1)">＋</div></div>
        </div>
        <div class="row"><div class="label">レッスンA<span class="price-info">¥1,100</span></div>
            <div class="stepper"><div class="btn" onclick="step('lesA', -1)">−</div><span class="count-value" id="lesAText">0</span><div class="btn" onclick="step('lesA', 1)">＋</div></div>
        </div>
        <div class="row"><div class="label">レッスンB<span class="price-info">¥3,300</span></div>
            <div class="stepper"><div class="btn" onclick="step('lesB', -1)">−</div><span class="count-value" id="lesBText">0</span><div class="btn" onclick="step('lesB', 1)">＋</div></div>
        </div>
        <div class="row"><div class="label">グレードUP<span class="price-info">¥1,100</span></div>
            <div class="stepper"><div class="btn" onclick="step('upg', -1)">−</div><span class="count-value" id="upgText">0</span><div class="btn" onclick="step('upg', 1)">＋</div></div>
        </div>
        <div class="row">
            <div class="label">その他単価</div>
            <input type="number" id="otherPrice" value="0" oninput="calculate()">
        </div>
        <div class="row">
            <div class="label">その他数量</div>
            <div class="stepper">
                <div class="btn" onclick="step('otherQty', -1)">−</div>
                <span class="count-value" id="otherQtyText">0</span>
                <div class="btn" onclick="step('otherQty', 1)">＋</div>
            </div>
        </div>
    </div>

    <div class="footer">by Popolo App.com</div>
</div>

<script>
    let data = {
        personCount: 1,
        exTime: 0,
        exQty: 0,
        ins: 1,
        wet: 0,
        boots: 0,
        lesA: 0,
        lesB: 0,
        upg: 0,
        otherQty: 0
    };

    function onPlanChange() {
        const select = document.getElementById('basePrice');
        const selectedOption = select.options[select.selectedIndex];
        
        // 特待生コースなら機材保険を0、それ以外なら1に自動設定
        if (selectedOption.getAttribute('data-tokutai') === 'true') {
            data.ins = 0;
        } else {
            data.ins = 1;
        }
        
        document.getElementById('insText').innerText = data.ins;
        calculate();
    }

    function step(key, val) {
        data[key] = Math.max(0, data[key] + val);
        
        // 延長時間と人数の連動ロジック (1名時)
        if (key === 'exTime' && data.personCount === 1) {
            data.exQty = (data.exTime > 0) ? 1 : 0;
            document.getElementById('exQtyText').innerText = data.exQty;
        }

        document.getElementById(key + 'Text').innerText = data[key];
        calculate();
    }

    function calculate() {
        const base = parseInt(document.getElementById('basePrice').value);
        const exUnit = parseInt(document.getElementById('exUnitPrice').value);
        const otherP = parseInt(document.getElementById('otherPrice').value) || 0;

        const total = (base * data.personCount) +
                      (exUnit * data.exTime * data.exQty) +
                      (550 * data.ins) +
                      (1100 * data.wet) +
                      (330 * data.boots) +
                      (1100 * data.lesA) +
                      (3300 * data.lesB) +
                      (1100 * data.upg) +
                      (otherP * data.otherQty);

        document.getElementById('totalDisplay').innerText = total.toLocaleString();
    }

    calculate();
</script>

</body>
</html>
