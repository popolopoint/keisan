<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>レンタル料金計算 v2.1.8f by Popolo App.com</title>
    <style>
        :root {
            --ios-bg: #f2f2f7;
            --ios-card: #ffffff;
            --ios-blue: #007aff;
            --ios-gray: #8e8e93;
            --ios-border: #c6c6c8;
            --ios-green: #34c759;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: var(--ios-bg); margin: 0; padding: 10px; color: #000; }
        .container { max-width: 500px; margin: 0 auto; padding-bottom: 100px; }
        
        .total-display-card {
            background: var(--ios-blue); color: white; border-radius: 15px; padding: 20px; text-align: center;
            margin-bottom: 20px; box-shadow: 0 8px 20px rgba(0,122,255,0.3); position: sticky; top: 10px; z-index: 100;
        }
        .total-amount { font-size: 42px; font-weight: bold; margin: 5px 0; color: #fff; }
        
        .section-header { font-size: 16px; color: var(--ios-gray); margin: 0 0 8px 15px; font-weight: bold; }
        .section { background: var(--ios-card); border-radius: 12px; margin-bottom: 20px; overflow: hidden; border: 1px solid var(--ios-border); }
        .row { display: flex; align-items: center; justify-content: space-between; padding: 20px; border-bottom: 0.5px solid var(--ios-border); }
        .row:last-child { border-bottom: none; }
        .label { font-size: 18px; font-weight: 600; flex: 1; }
        
        .select-wrapper { position: relative; width: 100%; }
        select, .input-price { 
            font-size: 32px; font-weight: bold; border: 2px solid var(--ios-border); border-radius: 12px; 
            background: #f8f8fa; color: var(--ios-blue); padding: 10px 45px 10px 15px; outline: none; width: 100%;
            -webkit-appearance: none; appearance: none; cursor: pointer;
        }
        .select-wrapper::after { content: '▼'; font-size: 14px; color: var(--ios-blue); position: absolute; right: 18px; top: 50%; transform: translateY(-50%); pointer-events: none; }
        
        textarea { width: 90%; margin: 10px 5%; min-height: 80px; resize: none; box-sizing: border-box; font-size: 18px; border: 1px solid var(--ios-border); border-radius: 8px; padding: 8px; }

        .request-btn { width: 90%; margin: 10px 5%; padding: 12px; background: #e5e5ea; color: #000; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .submit-btn { width: 90%; margin: 20px 5%; padding: 20px; background: var(--ios-green); color: white; border: none; border-radius: 15px; font-size: 20px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 12px rgba(52,199,89,0.3); -webkit-appearance: none; }

        .request-content { display: none; padding: 0 10px; background: #f9f9f9; border-top: 0.5px solid var(--ios-border); }
        .request-content.show { display: block; }

        .stepper { display: flex; align-items: center; gap: 10px; background: #efeff4; border-radius: 12px; padding: 5px 15px; border: 1px solid var(--ios-border); }
        .btn { width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: bold; color: var(--ios-blue); cursor: pointer; user-select: none; }
        .count-value { min-width: 45px; text-align: center; font-size: 32px; font-weight: bold; color: var(--ios-blue); }

        .detail-row { padding: 12px 15px; border-bottom: 0.5px solid #eee; display: flex; flex-direction: column; gap: 8px; }
        .cat-title { font-size: 14px; font-weight: bold; color: #fff; background: var(--ios-gray); padding: 4px 10px; border-radius: 4px; display: inline-block; margin-bottom: 5px; }
        .checkbox-group { display: flex; flex-wrap: wrap; gap: 10px; padding: 5px 0; }
        .checkbox-item { background: #fff; border: 1px solid var(--ios-border); border-radius: 6px; padding: 8px 12px; font-size: 16px; display: flex; align-items: center; gap: 5px; color: var(--ios-blue); font-weight: bold; }
        
        .select-sub-wrapper { position: relative; display: inline-block; width: 100%; margin-bottom: 5px; }
        .select-sub-wrapper::after { content: '▼'; font-size: 10px; color: var(--ios-blue); position: absolute; right: 12px; top: 50%; transform: translateY(-50%); pointer-events: none; }
        .select-sub { font-size: 18px !important; width: 100% !important; padding: 10px 30px 10px 10px !important; color: var(--ios-blue) !important; font-weight: bold; border-radius: 8px; border: 1px solid var(--ios-border); -webkit-appearance: none; background: #fff; }

        .footer { text-align: center; font-size: 14px; color: var(--ios-gray); margin: 20px 0; }
    </style>
</head>
<body>

<div class="container">
    <div class="total-display-card">
        <span style="font-size:14px; opacity:0.9;">レンタル料金計算 by Popolo App.com</span>
        <div class="total-amount">¥<span id="totalDisplay">0</span></div>
        <span style="font-size:11px; text-align:right; display:block; opacity:0.7;">Version 2.1.8f</span>
    </div>

    <div class="section-header">基本設定</div>
    <div class="section">
        <div class="row" style="flex-direction: column; align-items: flex-start; gap: 10px;">
            <div class="label">プランを選択</div>
            <div class="select-wrapper">
                <select id="basePrice" onchange="onPlanChange()">
                    <option value="6600" data-ext="1100">ウインドサーフィンset ¥6,600</option>
                    <option value="8800" data-ext="1100">ウイングフォイルset ¥8,800</option>
                    <option value="9900" data-ext="1100">ウインドフォイルset ¥9,900</option>
                    <option value="7000" data-ext="1100">初心者スクール・レッスン ¥7,000</option>
                    <option value="4400" data-ext="550">SUP ¥4,400</option>
                    <option value="4400" data-ext="550">ボードのみ ¥4,400</option>
                    <option value="4400" data-ext="550">セイル/ウイング/パラのみ ¥4,400</option>
                    <option value="4400" data-ext="550">フォイルのみ ¥4,400</option>
                </select>
            </div>
        </div>
        <div class="row">
            <div class="label">人数</div>
            <div class="stepper"><div class="btn" onclick="step('personCount', -1)">−</div><span class="count-value" id="personCountText">1</span><div class="btn" onclick="step('personCount', 1)">＋</div></div>
        </div>
    </div>

    <div class="section-header">時間延長</div>
    <div class="section">
        <div class="row">
            <div class="label">延長単価</div>
            <div class="select-wrapper" style="width: auto;"><select id="exUnitPrice" onchange="calculate()" style="min-width: 150px;"><option value="1100">¥1,100</option><option value="550">¥550</option></select></div>
        </div>
        <div class="row"><div class="label">時間(h)</div><div class="stepper"><div class="btn" onclick="step('exTime', -1)">−</div><span class="count-value" id="exTimeText">0</span><div class="btn" onclick="step('exTime', 1)">＋</div></div></div>
        <div class="row"><div class="label">延長人数</div><div class="stepper"><div class="btn" onclick="step('exQty', -1)">−</div><span class="count-value" id="exQtyText">0</span><div class="btn" onclick="step('exQty', 1)">＋</div></div></div>
    </div>

    <div class="section-header">オプション</div>
    <div class="section">
        <div class="row"><div class="label">機材保険<br><small>¥1,100</small></div><div class="stepper"><div class="btn" onclick="step('ins', -1)">−</div><span class="count-value" id="insText">0</span><div class="btn" onclick="step('ins', 1)">＋</div></div></div>
        <div class="row"><div class="label">ハーネス<br><small>¥550</small></div><div class="stepper"><div class="btn" onclick="step('harness', -1)">−</div><span class="count-value" id="harnessText">0</span><div class="btn" onclick="step('harness', 1)">＋</div></div></div>
        <div id="harnessDetails" style="background:#f9f9f9;"></div>
        <div class="row"><div class="label">ウェット<br><small>¥1,100</small></div><div class="stepper"><div class="btn" onclick="step('wet', -1)">−</div><span class="count-value" id="wetText">0</span><div class="btn" onclick="step('wet', 1)">＋</div></div></div>
        <div id="wetDetails" style="background:#f9f9f9;"></div>
        <div class="row"><div class="label">ブーツ<br><small>¥350</small></div><div class="stepper"><div class="btn" onclick="step('boots', -1)">−</div><span class="count-value" id="bootsText">0</span><div class="btn" onclick="step('boots', 1)">＋</div></div></div>
        <div id="bootsDetails" style="background:#f9f9f9;"></div>
        <div class="row"><div class="label">その他</div><input type="number" id="otherPrice" class="input-price" style="width: 160px;" placeholder="金額" oninput="calculate()"></div>
    </div>

    <div class="section-header">機材のリクエスト</div>
    <div class="section">
        <button class="request-btn" onclick="toggleRequest()">リクエスト設定を開く/閉じる</button>
        <div id="requestArea" class="request-content">
            <div class="detail-row">
                <div class="cat-title" style="background:#5856d6;">ウインドサーフィン用</div>
                <span style="font-size:14px;">ボード 微風時（最大）</span>
                <div class="select-sub-wrapper"><select id="windBoardMax" class="select-sub"><option value="">未選択</option><option>ダガー付ボード</option><option>140以上</option><option>130</option><option>120</option><option>110</option><option>100以下</option></select></div>
                <span style="font-size:14px;">ボード 強風時（小）</span>
                <div class="select-sub-wrapper"><select id="windBoardMin" class="select-sub"><option value="">未選択</option><option>微風時と同じ</option><option>110</option><option>100</option><option>80〜100</option><option>60〜80</option></select></div>
                <span style="font-size:14px;">セイル 微風時（最大）</span>
                <div class="select-sub-wrapper"><select id="windSailMax" class="select-sub"><option value="">未選択</option><option>8.5</option><option>7.0〜7.5</option><option>6.5</option><option>6.0</option><option>5.5</option><option>5.0以下</option></select></div>
            </div>
            <div class="detail-row">
                <div class="cat-title" style="background:#af52de;">ウイングフォイル用</div>
                <span style="font-size:14px;">ボード（サイズ）</span>
                <div class="select-sub-wrapper"><select id="wingBoardSize" class="select-sub"><option value="">未選択</option><option>120以上</option><option>110〜120</option><option>100〜110</option><option>90〜100</option><option>80〜90</option><option>70〜80</option><option>60〜70</option><option>60以下</option></select></div>
                <span style="font-size:14px;">フォイル（複数選択可）</span>
                <div class="checkbox-group" id="wingFoilGroup">
                    <label class="checkbox-item"><input type="checkbox" value="2000"> 2000</label>
                    <label class="checkbox-item"><input type="checkbox" value="1500"> 1500</label>
                    <label class="checkbox-item"><input type="checkbox" value="1200"> 1200</label>
                    <label class="checkbox-item"><input type="checkbox" value="1000"> 1000</label>
                    <label class="checkbox-item"><input type="checkbox" value="900以下"> 900</label>
                </div>
            </div>
        </div>
    </div>

    <div class="section-header">備考欄</div>
    <div class="section"><textarea id="memo" placeholder="ご質問など"></textarea></div>

    <button class="submit-btn" onclick="submitToForm()">予約手続きへ進む</button>
    <div class="footer">by Popolo App.com</div>
</div>

<script>
    let data = { personCount: 1, exTime: 0, exQty: 0, ins: 0, harness: 0, wet: 0, boots: 0 };

    function toggleRequest() { document.getElementById('requestArea').classList.toggle('show'); }

    function onPlanChange() {
        const select = document.getElementById('basePrice');
        document.getElementById('exUnitPrice').value = select.options[select.selectedIndex].getAttribute('data-ext');
        calculate();
    }

    function step(key, val) {
        data[key] = Math.max(0, data[key] + val);
        if (key === 'exTime' && data.personCount === 1) data.exQty = (data.exTime > 0) ? 1 : 0;
        document.getElementById(key + 'Text').innerText = data[key];
        if(['harness', 'wet', 'boots'].includes(key)) updateDetailFields();
        calculate();
    }

    function updateDetailFields() {
        const hDiv = document.getElementById('harnessDetails'); hDiv.innerHTML = '';
        for(let i=1; i<=data.harness; i++) hDiv.innerHTML += `<div class="detail-row"><span style="font-size:12px;color:var(--ios-blue);">ハーネス ${i}人目</span><div class="select-sub-wrapper"><select class="select-sub harness-val"><option value="">ウエスト選択</option>${(function(){let h='';for(let j=50;j<=120;j+=5)h+=`<option value="${j}">${j}〜${j+5}cm</option>`;return h;})()}</select></div></div>`;
        const wDiv = document.getElementById('wetDetails'); wDiv.innerHTML = '';
        for(let i=1; i<=data.wet; i++) wDiv.innerHTML += `<div class="detail-row"><span style="font-size:12px;color:var(--ios-blue);">ウェット ${i}人目</span><div style="display:flex;gap:5px;"><div class="select-sub-wrapper"><select class="select-sub wet-sex"><option value="">性別</option><option>男</option><option>女</option></select></div><div class="select-sub-wrapper"><select class="select-sub wet-h"><option value="">身長</option>${(function(){let h='';for(let j=130;j<=200;j+=5)h+=`<option value="${j}">${j}〜${j+5}cm</option>`;return h;})()}</select></div></div></div>`;
        const bDiv = document.getElementById('bootsDetails'); bDiv.innerHTML = '';
        for(let i=1; i<=data.boots; i++) bDiv.innerHTML += `<div class="detail-row"><span style="font-size:12px;color:var(--ios-blue);">ブーツ ${i}人目</span><div class="select-sub-wrapper"><select class="select-sub boots-val"><option value="">サイズ</option>${(function(){let h='';for(let j=18;j<=30;j++)h+=`<option value="${j}">${j}cm</option>`;return h;})()}</select></div></div>`;
    }

    function calculate() {
        const base = parseInt(document.getElementById('basePrice').value);
        const exUnit = parseInt(document.getElementById('exUnitPrice').value);
        const otherP = parseInt(document.getElementById('otherPrice').value) || 0;
        const total = (base * data.personCount) + (exUnit * data.exTime * data.exQty) + (1100 * data.ins) + (550 * data.harness) + (1100 * data.wet) + (350 * data.boots) + otherP;
        document.getElementById('totalDisplay').innerText = total.toLocaleString();
    }

    function submitToForm() {
        const planName = document.getElementById('basePrice').options[document.getElementById('basePrice').selectedIndex].text;
        let details = `【予約内容】\nプラン: ${planName}\n人数: ${data.personCount}名\n合計金額: ¥${document.getElementById('totalDisplay').innerText}\n`;
        
        if(data.exTime > 0) details += `延長: ${data.exTime}h (${data.exQty}名分)\n`;
        details += `機材保険: ${data.ins > 0 ? 'あり' : 'なし'}\n`;

        // オプション詳細の取得
        if(data.harness > 0) {
            details += "\n▼ハーネスサイズ:\n";
            document.querySelectorAll('.harness-val').forEach((el, i) => details += `${i+1}人目:${el.value || '未選択'}\n`);
        }
        if(data.wet > 0) {
            details += "\n▼ウェットサイズ:\n";
            const sexes = document.querySelectorAll('.wet-sex');
            const hs = document.querySelectorAll('.wet-h');
            sexes.forEach((el, i) => details += `${i+1}人目:${el.value || '?'}/${hs[i].value || '?'}\n`);
        }
        if(data.boots > 0) {
            details += "\n▼ブーツサイズ:\n";
            document.querySelectorAll('.boots-val').forEach((el, i) => details += `${i+1}人目:${el.value || '未選択'}cm\n`);
        }

        // リクエスト詳細
        let req = "\n【機材リクエスト】\n";
        const wMax = document.getElementById('windBoardMax').value;
        const wMin = document.getElementById('windBoardMin').value;
        const wSail = document.getElementById('windSailMax').value;
        if(wMax || wMin || wSail) req += `ウインド: ボード大(${wMax || '-'}) 小(${wMin || '-'}) セイル(${wSail || '-'})\n`;
        
        const wingB = document.getElementById('wingBoardSize').value;
        let wingF = [];
        document.querySelectorAll('#wingFoilGroup input:checked').forEach(el => wingF.push(el.value));
        if(wingB || wingF.length > 0) req += `ウイング: ボード(${wingB || '-'}) フォイル(${wingF.join(',') || '-'})\n`;

        const memo = document.getElementById('memo').value;
        const fullText = details + req + (memo ? `\n【備考】\n${memo}` : '');
        const encodedText = encodeURIComponent(fullText);
        window.location.href = `https://docs.google.com/forms/d/e/1FAIpQLSdndrKiaXraqJiEUL27qMQOz23pbquxVdUFEOrOLKQa0Qfh2g/viewform?usp=pp_url&entry.1964882866=${encodedText}`;
    }
    calculate();
</script>
</body>
</html>
