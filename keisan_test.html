<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>レンタル料金計算 v1.2.3 by Popolo App.com</title>
    <style>
        :root {
            --ios-bg: #f2f2f7;
            --ios-card: #ffffff;
            --ios-blue: #007aff;
            --ios-gray: #8e8e93;
            --ios-border: #c6c6c8;
            --font-main: 20px;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--ios-bg);
            margin: 0;
            padding: 10px;
            color: #000;
        }
        .container { max-width: 500px; margin: 0 auto; padding-bottom: 50px; }
        
        .total-display-card {
            background: var(--ios-blue);
            color: white;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
            box-shadow: 0 8px 20px rgba(0,122,255,0.3);
            position: sticky;
            top: 10px;
            z-index: 100;
        }
        .app-name-label { font-size: 15px; font-weight: bold; opacity: 0.9; margin-bottom: 5px; display: block; }
        .total-amount { font-size: 42px; font-weight: bold; margin: 5px 0; }
        .ver-label { font-size: 11px; text-align: right; display: block; opacity: 0.7; }

        .section-header { font-size: 16px; color: var(--ios-gray); margin: 0 0 8px 15px; font-weight: bold; }
        .section { background: var(--ios-card); border-radius: 12px; margin-bottom: 20px; overflow: hidden; border: 1px solid var(--ios-border); }
        
        .row { display: flex; align-items: center; justify-content: space-between; padding: 15px 20px; border-bottom: 0.5px solid var(--ios-border); }
        .row:last-child { border-bottom: none; }
        
        .label { font-size: 18px; font-weight: 600; flex-shrink: 0; }
        
        select { 
            font-size: 18px; 
            border: 1px solid var(--ios-border); 
            border-radius: 8px;
            background: #fafafa; 
            text-align-last: center;
            color: var(--ios-blue); 
            padding: 8px;
            min-width: 140px;
        }

        .stepper { display: flex; align-items: center; gap: 15px; background: #efeff4; border-radius: 10px; padding: 4px 10px; }
        .btn { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: bold; color: var(--ios-blue); cursor: pointer; user-select: none; }
        .count-value { min-width: 30px; text-align: center; font-size: 22px; font-weight: bold; }

        /* 詳細入力エリア（サイズなど） */
        .details-area { background: #f9f9f9; padding: 0 15px; border-top: 0.5px dashed var(--ios-border); }
        .detail-row { padding: 10px 0; border-bottom: 0.5px solid #eee; display: flex; flex-direction: column; gap: 8px; }
        .detail-row:last-child { border-bottom: none; }
        .detail-title { font-size: 14px; color: var(--ios-blue); font-weight: bold; }
        .select-group { display: flex; gap: 5px; flex-wrap: wrap; }
        .select-sub { flex: 1; min-width: 80px; font-size: 14px; padding: 5px; }

        .footer { text-align: center; font-size: 14px; color: var(--ios-gray); margin-top: 20px; }
        .price-info { font-size: 12px; color: var(--ios-gray); display: block; font-weight: normal; }
    </style>
</head>
<body>

<div class="container">
    <div class="total-display-card">
        <span class="app-name-label">レンタル料金計算 by Popolo App.com</span>
        <div class="total-amount">¥<span id="totalDisplay">0</span></div>
        <span class="ver-label">Version 1.2.3</span>
    </div>

    <div class="section-header">基本設定</div>
    <div class="section">
        <div class="row">
            <div class="label">プラン</div>
            <select id="basePrice" onchange="onPlanChange()">
                <option value="5500">ウインドサーフィン ¥5,500</option>
                <option value="7700">ウイングフォイル ¥7,700</option>
                <option value="8800">ウインドフォイル ¥8,800</option>
                <option value="4400">SUP ¥4,400</option>
                <option value="6000" data-tokutai="true">特待生基本 ¥6,000</option>
                <option value="7500" data-tokutai="true">特待生コミコミ ¥7,500</option>
            </select>
        </div>
        <div class="row">
            <div class="label">人数</div>
            <div class="stepper">
                <div class="btn" onclick="step('personCount', -1)">−</div>
                <span class="count-value" id="personCountText">1</span>
                <div class="btn" onclick="step('personCount', 1)">＋</div>
            </div>
        </div>
    </div>

    <div class="section-header">オプション</div>
    <div class="section">
        <div class="row"><div class="label">機材保険<span class="price-info">¥550</span></div>
            <div class="stepper"><div class="btn" onclick="step('ins', -1)">−</div><span class="count-value" id="insText">1</span><div class="btn" onclick="step('ins', 1)">＋</div></div>
        </div>
        <div class="row"><div class="label">ハーネス<span class="price-info">¥550</span></div>
            <div class="stepper"><div class="btn" onclick="step('harness', -1)">−</div><span class="count-value" id="harnessText">0</span><div class="btn" onclick="step('harness', 1)">＋</div></div>
        </div>
        <div id="harnessDetails" class="details-area"></div>

        <div class="row"><div class="label">ウェット<span class="price-info">¥1,100</span></div>
            <div class="stepper"><div class="btn" onclick="step('wet', -1)">−</div><span class="count-value" id="wetText">0</span><div class="btn" onclick="step('wet', 1)">＋</div></div>
        </div>
        <div id="wetDetails" class="details-area"></div>

        <div class="row"><div class="label">ブーツ<span class="price-info">¥330</span></div>
            <div class="stepper"><div class="btn" onclick="step('boots', -1)">−</div><span class="count-value" id="bootsText">0</span><div class="btn" onclick="step('boots', 1)">＋</div></div>
        </div>
        <div id="bootsDetails" class="details-area"></div>

        <div class="row"><div class="label">レッスンA<span class="price-info">¥1,100</span></div>
            <div class="stepper"><div class="btn" onclick="step('lesA', -1)">−</div><span class="count-value" id="lesAText">0</span><div class="btn" onclick="step('lesA', 1)">＋</div></div>
        </div>
        <div class="row"><div class="label">レッスンB<span class="price-info">¥3,300</span></div>
            <div class="stepper"><div class="btn" onclick="step('lesB', -1)">−</div><span class="count-value" id="lesBText">0</span><div class="btn" onclick="step('lesB', 1)">＋</div></div>
        </div>
        <div class="row"><div class="label">グレードUP<span class="price-info">¥1,100</span></div>
            <div class="stepper"><div class="btn" onclick="step('upg', -1)">−</div><span class="count-value" id="upgText">0</span><div class="btn" onclick="step('upg', 1)">＋</div></div>
        </div>
    </div>

    <div class="section-header">時間延長</div>
    <div class="section">
        <div class="row"><div class="label">延長単価</div><select id="exUnitPrice" onchange="calculate()"><option value="1100">¥1,100</option><option value="550">¥550</option></select></div>
        <div class="row"><div class="label">時間(h)</div><div class="stepper"><div class="btn" onclick="step('exTime', -1)">−</div><span class="count-value" id="exTimeText">0</span><div class="btn" onclick="step('exTime', 1)">＋</div></div></div>
        <div class="row"><div class="label">延長人数</div><div class="stepper"><div class="btn" onclick="step('exQty', -1)">−</div><span class="count-value" id="exQtyText">0</span><div class="btn" onclick="step('exQty', 1)">＋</div></div></div>
    </div>

    <div class="footer">by Popolo App.com</div>
</div>

<script>
    let data = {
        personCount: 1, exTime: 0, exQty: 0, ins: 1, harness: 0, wet: 0, boots: 0, lesA: 0, lesB: 0, upg: 0
    };

    function onPlanChange() {
        const select = document.getElementById('basePrice');
        const isTokutai = select.options[select.selectedIndex].getAttribute('data-tokutai') === 'true';
        data.ins = isTokutai ? 0 : 1;
        document.getElementById('insText').innerText = data.ins;
        calculate();
    }

    function step(key, val) {
        data[key] = Math.max(0, data[key] + val);
        if (key === 'exTime' && data.personCount === 1) {
            data.exQty = (data.exTime > 0) ? 1 : 0;
            document.getElementById('exQtyText').innerText = data.exQty;
        }
        document.getElementById(key + 'Text').innerText = data[key];
        updateDetailFields();
        calculate();
    }

    function generateOptions(min, max, suffix, step=1) {
        let html = '';
        for(let i=min; i<=max; i+=step) { html += `<option value="${i}">${i}${suffix}</option>`; }
        return html;
    }

    function updateDetailFields() {
        // ハーネス詳細
        const hDiv = document.getElementById('harnessDetails');
        hDiv.innerHTML = '';
        for(let i=1; i<=data.harness; i++) {
            hDiv.innerHTML += `<div class="detail-row"><div class="detail-title">ハーネス ${i}人目</div>
                <div class="select-group"><select class="select-sub"><option>ウエストサイズ選択</option>${generateOptions(50, 120, 'cm')}</select></div></div>`;
        }

        // ウェット詳細
        const wDiv = document.getElementById('wetDetails');
        wDiv.innerHTML = '';
        for(let i=1; i<=data.wet; i++) {
            wDiv.innerHTML += `<div class="detail-row"><div class="detail-title">ウェット ${i}人目</div>
                <div class="select-group">
                    <select class="select-sub"><option>性別</option><option>男性</option><option>女性</option></select>
                    <select class="select-sub"><option>身長</option>${generateOptions(130, 200, 'cm')}</select>
                    <select class="select-sub"><option>体重</option>${generateOptions(30, 120, 'kg')}</select>
                </div></div>`;
        }

        // ブーツ詳細
        const bDiv = document.getElementById('bootsDetails');
        bDiv.innerHTML = '';
        for(let i=1; i<=data.boots; i++) {
            bDiv.innerHTML += `<div class="detail-row"><div class="detail-title">ブーツ ${i}人目</div>
                <div class="select-group"><select class="select-sub"><option>サイズ選択</option>${generateOptions(18, 30, 'cm', 0.5)}</select></div></div>`;
        }
    }

    function calculate() {
        const base = parseInt(document.getElementById('basePrice').value);
        const exUnit = parseInt(document.getElementById('exUnitPrice').value);
        const total = (base * data.personCount) + (exUnit * data.exTime * data.exQty) +
                      (550 * data.ins) + (550 * data.harness) + (1100 * data.wet) + (330 * data.boots) +
                      (1100 * data.lesA) + (3300 * data.lesB) + (1100 * data.upg);
        document.getElementById('totalDisplay').innerText = total.toLocaleString();
    }

    calculate();
</script>
</body>
</html>
