<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>レンタル料金計算 v2.1.8 by Popolo App.com</title>
    <style>
        :root {
            --ios-bg: #f2f2f7;
            --ios-card: #ffffff;
            --ios-blue: #007aff;
            --ios-gray: #8e8e93;
            --ios-border: #c6c6c8;
            --ios-green: #34c759;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: var(--ios-bg); margin: 0; padding: 10px; color: #000; }
        .container { max-width: 500px; margin: 0 auto; padding-bottom: 100px; }
        
        .total-display-card {
            background: var(--ios-blue); color: white; border-radius: 15px; padding: 20px; text-align: center;
            margin-bottom: 20px; box-shadow: 0 8px 20px rgba(0,122,255,0.3); position: sticky; top: 10px; z-index: 100;
        }
        .total-amount { font-size: 42px; font-weight: bold; margin: 5px 0; }
        
        .section-header { font-size: 16px; color: var(--ios-gray); margin: 0 0 8px 15px; font-weight: bold; }
        .section { background: var(--ios-card); border-radius: 12px; margin-bottom: 20px; overflow: hidden; border: 1px solid var(--ios-border); }
        .row { display: flex; align-items: center; justify-content: space-between; padding: 20px; border-bottom: 0.5px solid var(--ios-border); }
        .row:last-child { border-bottom: none; }
        .label { font-size: 18px; font-weight: 600; flex: 1; }
        
        /* 窓の中の数字を大きく調整 */
        select, .input-price { 
            font-size: 32px; 
            font-weight: bold;
            border: 1px solid var(--ios-border); 
            border-radius: 10px; 
            background: #fafafa; 
            color: var(--ios-blue); 
            padding: 5px 10px; 
            outline: none;
            -webkit-appearance: none;
        }
        select { text-align-last: center; min-width: 140px; }
        
        textarea { width: 90%; margin: 10px 5%; min-height: 80px; resize: none; box-sizing: border-box; font-size: 18px; border: 1px solid var(--ios-border); border-radius: 8px; padding: 8px; }

        .request-btn { width: 90%; margin: 10px 5%; padding: 12px; background: #e5e5ea; color: #000; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .submit-btn { width: 90%; margin: 20px 5%; padding: 20px; background: var(--ios-green); color: white; border: none; border-radius: 15px; font-size: 20px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 12px rgba(52,199,89,0.3); -webkit-appearance: none; }

        .request-content { display: none; padding: 0 10px; background: #f9f9f9; border-top: 0.5px solid var(--ios-border); }
        .request-content.show { display: block; }

        .stepper { display: flex; align-items: center; gap: 10px; background: #efeff4; border-radius: 12px; padding: 5px 15px; }
        .btn { width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: bold; color: var(--ios-blue); cursor: pointer; user-select: none; }
        
        .count-value { 
            min-width: 45px; 
            text-align: center; 
            font-size: 32px; 
            font-weight: bold; 
            color: var(--ios-blue);
        }

        .detail-row { padding: 12px 15px; border-bottom: 0.5px solid #eee; display: flex; flex-direction: column; gap: 5px; }
        .cat-title { font-size: 14px; font-weight: bold; color: #fff; background: var(--ios-gray); padding: 4px 10px; border-radius: 4px; display: inline-block; margin-bottom: 5px; }
        .footer { text-align: center; font-size: 14px; color: var(--ios-gray); margin: 20px 0; }
        
        /* 詳細設定（サイズ選択など）のサブ項目 */
        .select-sub { font-size: 18px !important; min-width: 120px !important; }
    </style>
</head>
<body>

<div class="container">
    <div class="total-display-card">
        <span style="font-size:14px; opacity:0.9;">レンタル料金計算 by Popolo App.com</span>
        <div class="total-amount">¥<span id="totalDisplay">0</span></div>
        <span style="font-size:11px; text-align:right; display:block; opacity:0.7;">Version 2.1.8</span>
    </div>

    <div class="section-header">基本設定</div>
    <div class="section">
        <div class="row" style="flex-direction: column; align-items: flex-start; gap: 10px;">
            <div class="label">プラン</div>
            <select id="basePrice" onchange="onPlanChange()" style="width: 100%;">
                <option value="6600" data-ext="1100">ウインドサーフィンset ¥6,600</option>
                <option value="8800" data-ext="1100">ウイングフォイルset ¥8,800</option>
                <option value="9900" data-ext="1100">ウインドフォイルset ¥9,900</option>
                <option value="7000" data-ext="1100">初心者スクール・レッスン ¥7,000</option>
                <option value="4400" data-ext="550">SUP ¥4,400</option>
                <option value="4400" data-ext="550">ボードのみ ¥4,400</option>
                <option value="4400" data-ext="550">セイル/ウイング/パラのみ ¥4,400</option>
                <option value="4400" data-ext="550">フォイルのみ ¥4,400</option>
            </select>
        </div>
        <div class="row">
            <div class="label">人数</div>
            <div class="stepper"><div class="btn" onclick="step('personCount', -1)">−</div><span class="count-value" id="personCountText">1</span><div class="btn" onclick="step('personCount', 1)">＋</div></div>
        </div>
    </div>

    <div class="section-header">時間延長</div>
    <div class="section">
        <div class="row">
            <div class="label">延長単価</div>
            <select id="exUnitPrice" onchange="calculate()">
                <option value="1100">¥1,100</option>
                <option value="550">¥550</option>
            </select>
        </div>
        <div class="row">
            <div class="label">時間(h)</div>
            <div class="stepper"><div class="btn" onclick="step('exTime', -1)">−</div><span class="count-value" id="exTimeText">0</span><div class="btn" onclick="step('exTime', 1)">＋</div></div>
        </div>
        <div class="row">
            <div class="label">延長人数</div>
            <div class="stepper"><div class="btn" onclick="step('exQty', -1)">−</div><span class="count-value" id="exQtyText">0</span><div class="btn" onclick="step('exQty', 1)">＋</div></div>
        </div>
    </div>

    <div class="section-header">オプション</div>
    <div class="section">
        <div class="row"><div class="label">機材保険<br><small style="font-weight:normal;color:#8e8e93;">¥1,100</small></div><div class="stepper"><div class="btn" onclick="step('ins', -1)">−</div><span class="count-value" id="insText">0</span><div class="btn" onclick="step('ins', 1)">＋</div></div></div>
        <div class="row"><div class="label">ハーネス<br><small style="font-weight:normal;color:#8e8e93;">¥550</small></div><div class="stepper"><div class="btn" onclick="step('harness', -1)">−</div><span class="count-value" id="harnessText">0</span><div class="btn" onclick="step('harness', 1)">＋</div></div></div>
        <div id="harnessDetails" style="background:#f9f9f9;"></div>
        <div class="row"><div class="label">ウェット<br><small style="font-weight:normal;color:#8e8e93;">¥1,100</small></div><div class="stepper"><div class="btn" onclick="step('wet', -1)">−</div><span class="count-value" id="wetText">0</span><div class="btn" onclick="step('wet', 1)">＋</div></div></div>
        <div id="wetDetails" style="background:#f9f9f9;"></div>
        <div class="row"><div class="label">ブーツ<br><small style="font-weight:normal;color:#8e8e93;">¥350</small></div><div class="stepper"><div class="btn" onclick="step('boots', -1)">−</div><span class="count-value" id="bootsText">0</span><div class="btn" onclick="step('boots', 1)">＋</div></div></div>
        <div id="bootsDetails" style="background:#f9f9f9;"></div>
        <div class="row"><div class="label">レッスンA<br><small style="font-weight:normal;color:#8e8e93;">¥1,100</small></div><div class="stepper"><div class="btn" onclick="step('lesA', -1)">−</div><span class="count-value" id="lesAText">0</span><div class="btn" onclick="step('lesA', 1)">＋</div></div></div>
        <div class="row"><div class="label">レッスンB<br><small style="font-weight:normal;color:#8e8e93;">¥3,300</small></div><div class="stepper"><div class="btn" onclick="step('lesB', -1)">−</div><span class="count-value" id="lesBText">0</span><div class="btn" onclick="step('lesB', 1)">＋</div></div></div>
        <div class="row"><div class="label">プレミアム<br><small style="font-weight:normal;color:#8e8e93;">¥1,100</small></div><div class="stepper"><div class="btn" onclick="step('upg', -1)">−</div><span class="count-value" id="upgText">0</span><div class="btn" onclick="step('upg', 1)">＋</div></div></div>
        <div class="row"><div class="label">その他</div><input type="number" id="otherPrice" class="input-price" style="width: 150px;" placeholder="金額" oninput="calculate()"></div>
    </div>

    <div class="section-header">機材のリクエスト</div>
    <div class="section">
        <button class="request-btn" onclick="toggleRequest()">リクエスト設定を開く/閉じる</button>
        <div id="requestArea" class="request-content">
            <div class="detail-row">
                <div class="cat-title" style="background:#5856d6;">ウインドサーフィン用</div>
                <span style="font-size:14px;">ボード 微風時（最大）</span>
                <select id="windBoardMax" class="select-sub">
                    <option value="">未選択</option>
                    <option>ダガー付ボード</option><option>140以上</option><option>130</option><option>120</option><option>110</option><option>100以下</option>
                </select>
            </div>
        </div>
    </div>

    <div class="section-header">備考欄</div>
    <div class="section">
        <textarea id="memo" placeholder="普段使っているサイズ、お問い合わせ、ご質問など"></textarea>
    </div>

    <button class="submit-btn" onclick="submitToForm()">予約手続きへ進む<br><span style="font-size:12px; font-weight:normal;">(内容を自動入力してフォームを開きます)</span></button>

    <div class="footer">by Popolo App.com</div>
</div>

<script>
    let data = { personCount: 1, exTime: 0, exQty: 0, ins: 0, harness: 0, wet: 0, boots: 0, lesA: 0, lesB: 0, upg: 0 };

    function toggleRequest() {
        document.getElementById('requestArea').classList.toggle('show');
    }

    function onPlanChange() {
        const select = document.getElementById('basePrice');
        const opt = select.options[select.selectedIndex];
        document.getElementById('exUnitPrice').value = opt.getAttribute('data-ext');
        calculate();
    }

    function step(key, val) {
        data[key] = Math.max(0, data[key] + val);
        if (key === 'exTime' && data.personCount === 1) {
            data.exQty = (data.exTime > 0) ? 1 : 0;
            document.getElementById('exQtyText').innerText = data.exQty;
        }
        document.getElementById(key + 'Text').innerText = data[key];
        updateDetailFields();
        calculate();
    }

    function generateRangeOptions(min, max, step, suffix) {
        let html = '';
        for(let i=min; i<max; i+=step) { html += `<option value="${i}">${i}〜${i+step}${suffix}</option>`; }
        return html;
    }

    function updateDetailFields() {
        const hDiv = document.getElementById('harnessDetails'); hDiv.innerHTML = '';
        for(let i=1; i<=data.harness; i++) hDiv.innerHTML += `<div class="detail-row"><span style="font-size:12px;color:var(--ios-blue);">ハーネス ${i}人目</span><select class="select-sub harness-val"><option value="">選択</option>${generateRangeOptions(50, 120, 5, 'cm')}</select></div>`;
        const wDiv = document.getElementById('wetDetails'); wDiv.innerHTML = '';
        for(let i=1; i<=data.wet; i++) wDiv.innerHTML += `<div class="detail-row"><span style="font-size:12px;color:var(--ios-blue);">ウェット ${i}人目</span><div style="display:flex;gap:5px;"><select class="select-sub wet-sex"><option value="">性別</option><option>男</option><option>女</option></select><select class="select-sub wet-h"><option value="">身長</option>${generateRangeOptions(130, 200, 5, 'cm')}</select><select class="select-sub wet-w"><option value="">体重</option>${generateRangeOptions(30, 120, 5, 'kg')}</select></div></div>`;
        const bDiv = document.getElementById('bootsDetails'); bDiv.innerHTML = '';
        for(let i=1; i<=data.boots; i++) bDiv.innerHTML += `<div class="detail-row"><span style="font-size:12px;color:var(--ios-blue);">ブーツ ${i}人目</span><select class="select-sub boots-val"><option value="">サイズ選択</option>${(function(){let h='';for(let j=18;j<=30;j++)h+=`<option value="${j}">${j}cm</option>`;return h;})()}</select></div>`;
    }

    function calculate() {
        const base = parseInt(document.getElementById('basePrice').value);
        const exUnit = parseInt(document.getElementById('exUnitPrice').value);
        const otherP = parseInt(document.getElementById('otherPrice').value) || 0;
        
        const total = (base * data.personCount) + (exUnit * data.exTime * data.exQty) +
                      (1100 * data.ins) + (550 * data.harness) + (1100 * data.wet) + (350 * data.boots) +
                      (1100 * data.lesA) + (3300 * data.lesB) + (1100 * data.upg) + otherP;
        document.getElementById('totalDisplay').innerText = total.toLocaleString();
    }

    function submitToForm() {
        const planSelect = document.getElementById('basePrice');
        const planName = planSelect.options[planSelect.selectedIndex].text;
        const total = document.getElementById('totalDisplay').innerText;
        
        let details = `【予約内容】\nプラン: ${planName}\n人数: ${data.personCount}名\n合計金額: ¥${total}\n`;
        if(data.exTime > 0) details += `延長: ${data.exTime}h (${data.exQty}名分)\n`;
        details += `機材保険: ${data.ins > 0 ? 'あり' : 'なし'}\n`;
        
        const fullText = details;
        const encodedText = encodeURIComponent(fullText);
        const formUrl = `https://docs.google.com/forms/d/e/1FAIpQLSdndrKiaXraqJiEUL27qMQOz23pbquxVdUFEOrOLKQa0Qfh2g/viewform?usp=pp_url&entry.1964882866=${encodedText}`;
        window.location.href = formUrl;
    }

    calculate();
</script>
</body>
</html>
